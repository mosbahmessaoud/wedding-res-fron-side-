<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.
    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="نظام حجز مواعيد الأعراس">

  <!-- ============================================================
       SECURITY HEADERS
  ============================================================ -->

  <!-- Prevent clickjacking: disallow embedding in iframes -->
  <meta http-equiv="X-Frame-Options" content="DENY">

  <!-- Block MIME-type sniffing attacks -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- Force HTTPS for 1 year, including subdomains -->
  <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains; preload">

  <!-- Content Security Policy: only allow resources from same origin -->
  <!-- ⚠️ If you use external fonts/CDNs, add them to the policy below -->
  <meta http-equiv="Content-Security-Policy"
        content="
          default-src 'self';
          script-src 'self' 'unsafe-inline';
          style-src 'self' 'unsafe-inline';
          img-src 'self' data:;
          font-src 'self';
          connect-src 'self';
          frame-ancestors 'none';
          base-uri 'self';
          form-action 'self';
        ">

  <!-- Stop referrer information from leaking to other sites -->
  <meta name="referrer" content="no-referrer">

  <!-- Disable browser features that aren't needed -->
  <meta http-equiv="Permissions-Policy"
        content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()">

  <!-- Block XSS in older browsers -->
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">

  <!-- ============================================================
       iOS META TAGS & ICONS
  ============================================================ -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="أسُولي - ASULI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo_dark5.png"/>

  <title>أسُولي - ASULI</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
